<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员后台 - 表白墙</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
        }

        h1 {
            color: #4CAF50;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 1.1em;
        }

        .admin-panel {
            display: none;
        }

        .login-form {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 400px;
            margin: 50px auto;
        }

        .login-input {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #4CAF50;
        }

        button {
            background: linear-gradient(45deg, #4CAF50, #8BC34A);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-right: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(76, 175, 80, 0.3);
        }

        .danger-btn {
            background: linear-gradient(45deg, #f44336, #ff9800);
        }

        .tab-container {
            display: flex;
            margin-bottom: 20px;
            border-bottom: 2px solid #ddd;
        }

        .tab {
            padding: 10px 20px;
            cursor: pointer;
            background: #e0e0e0;
            border: none;
            border-radius: 5px 5px 0 0;
            margin-right: 5px;
        }

        .tab.active {
            background: #4CAF50;
            color: white;
        }

        .tab-content {
            display: none;
            background: white;
            padding: 20px;
            border-radius: 0 0 10px 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }

        .tab-content.active {
            display: block;
        }

        .form-container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .posts-container {
            display: grid;
            gap: 15px;
        }

        .post {
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.08);
            border-left: 4px solid #FF9800;
        }

        .announcement {
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.08);
            border-left: 4px solid #4CAF50;
        }

        .system-post {
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.08);
            border-left: 4px solid #2196F3;
        }

        .post-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 1px solid #eee;
        }

        .sender-name {
            font-weight: bold;
            color: #e91e63;
        }

        .announcement .sender-name {
            color: #4CAF50;
        }

        .system-post .sender-name {
            color: #2196F3;
        }

        .post-content {
            line-height: 1.5;
            color: #444;
            margin-bottom: 10px;
        }

        .post-title {
            font-weight: bold;
            color: #4CAF50;
            margin-bottom: 10px;
        }

        .post-time {
            color: #999;
            font-size: 0.9em;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .approve-btn {
            background: linear-gradient(45deg, #4CAF50, #8BC34A);
        }

        .reject-btn {
            background: linear-gradient(45deg, #f44336, #ff9800);
        }

        .delete-btn {
            background: linear-gradient(45deg, #f44336, #ff9800);
        }

        .empty-posts {
            text-align: center;
            color: #888;
            font-style: italic;
            padding: 30px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.08);
        }

        @media (max-width: 600px) {
            .container {
                padding: 10px;
            }
            
            h1 {
                font-size: 2em;
            }
            
            .tab-container {
                flex-direction: column;
            }
            
            .tab {
                margin-bottom: 5px;
            }
            
            .action-buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔐 管理员后台</h1>
            <p class="subtitle">内容审核与管理系统</p>
        </header>

        <!-- 登录表单 -->
        <div class="login-form" id="loginForm">
            <h2 style="text-align: center; color: #4CAF50; margin-bottom: 20px;">管理员登录</h2>
            <div class="login-input">
                <label for="adminUsername">用户名:</label>
                <input type="text" id="adminUsername" placeholder="输入管理员用户名">
            </div>
            <div class="login-input">
                <label for="adminPassword">密码:</label>
                <input type="password" id="adminPassword" placeholder="输入管理员密码">
            </div>
            <div style="text-align: center;">
                <button onclick="loginAdmin()">登录</button>
            </div>
        </div>

        <!-- 管理员面板 -->
        <div class="admin-panel" id="adminPanel">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2>📋 管理控制台</h2>
                <button class="danger-btn" onclick="logoutAdmin()">退出登录</button>
            </div>

            <!-- 标签页 -->
            <div class="tab-container">
                <button class="tab active" onclick="switchTab('review')">内容审核</button>
                <button class="tab" onclick="switchTab('system')">系统帖子</button>
                <button class="tab" onclick="switchTab('announcements')">公告管理</button>
            </div>

            <!-- 内容审核标签页 -->
            <div class="tab-content active" id="reviewTab">
                <h3>📝 待审核内容</h3>
                <div class="posts-container" id="pendingPostsContainer">
                    <!-- 待审核内容将动态插入这里 -->
                </div>
            </div>

            <!-- 系统帖子标签页 -->
            <div class="tab-content" id="systemTab">
                <h3>🤖 发布系统帖子</h3>
                <div class="form-container">
                    <div class="form-group">
                        <label for="systemContent">内容:</label>
                        <textarea id="systemContent" rows="5" placeholder="输入要发布的系统消息..."></textarea>
                    </div>
                    <div class="form-group">
                        <label>上传附件:</label>
                        <div class="upload-area" id="systemUploadArea" onclick="document.getElementById('systemFileUpload').click()">
                            <p>点击上传文件或拖拽文件到这里</p>
                            <p style="font-size: 0.9em; color: #999;">支持任意文件格式，最大 20MB</p>
                        </div>
                        <input type="file" id="systemFileUpload" class="file-input" onchange="handleSystemFileSelect(event)">
                    </div>
                    <div id="systemFileInfo"></div>
                    <div id="systemPreviewContainer" class="preview-container"></div>
                    <button onclick="createSystemPost()">发布系统帖子</button>
                </div>
            </div>

            <!-- 公告管理标签页 -->
            <div class="tab-content" id="announcementsTab">
                <h3>📢 发布公告</h3>
                <div class="form-container">
                    <div class="form-group">
                        <label for="announcementTitle">公告标题:</label>
                        <input type="text" id="announcementTitle" placeholder="输入公告标题">
                    </div>
                    <div class="form-group">
                        <label for="announcementContent">公告内容:</label>
                        <textarea id="announcementContent" rows="5" placeholder="输入公告内容..."></textarea>
                    </div>
                    <div class="form-group">
                        <label>上传附件:</label>
                        <div class="upload-area" id="announcementUploadArea" onclick="document.getElementById('announcementFileUpload').click()">
                            <p>点击上传文件或拖拽文件到这里</p>
                            <p style="font-size: 0.9em; color: #999;">支持任意文件格式，最大 20MB</p>
                        </div>
                        <input type="file" id="announcementFileUpload" class="file-input" onchange="handleAnnouncementFileSelect(event)">
                    </div>
                    <div id="announcementFileInfo"></div>
                    <div id="announcementPreviewContainer" class="preview-container"></div>
                    <button onclick="publishAnnouncement()">发布公告</button>
                </div>
                
                <h3 style="margin-top: 30px;">📋 已发布公告</h3>
                <div class="posts-container" id="announcementsContainer">
                    <!-- 已发布公告将动态插入这里 -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // 管理员状态
        let isAdminLoggedIn = false;

        // 切换标签页
        function switchTab(tabName) {
            // 隐藏所有标签内容
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
            });
            
            // 显示选中的标签内容
            document.getElementById(tabName + 'Tab').classList.add('active');
            event.target.classList.add('active');
            
            // 如果切换到审核或公告标签，加载对应内容
            if (tabName === 'review') {
                loadPendingPosts();
            } else if (tabName === 'announcements') {
                loadAnnouncements();
            }
        }

        // 管理员登录
        async function loginAdmin() {
            const username = document.getElementById('adminUsername').value;
            const password = document.getElementById('adminPassword').value;
            
            if (!username || !password) {
                alert('请输入用户名和密码！');
                return;
            }

            try {
                const response = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });

                if (response.ok) {
                    isAdminLoggedIn = true;
                    document.getElementById('loginForm').style.display = 'none';
                    document.getElementById('adminPanel').style.display = 'block';
                    loadPendingPosts();
                    alert('登录成功！');
                } else {
                    const data = await response.json();
                    alert(data.error || '登录失败！');
                }
            } catch (error) {
                console.error('登录失败:', error);
                alert('登录失败，请检查网络连接！');
            }
        }

        // 管理员登出
        function logoutAdmin() {
            if (confirm('确定要退出登录吗？')) {
                isAdminLoggedIn = false;
                document.getElementById('adminPanel').style.display = 'none';
                document.getElementById('loginForm').style.display = 'block';
                document.getElementById('adminUsername').value = '';
                document.getElementById('adminPassword').value = '';
            }
        }

        // 加载待审核内容
        async function loadPendingPosts() {
            if (!isAdminLoggedIn) return;
            
            try {
                const response = await fetch('/api/pending');
                const pendingPosts = await response.json();
                renderPendingPosts(pendingPosts);
            } catch (error) {
                console.error('加载待审核内容失败:', error);
            }
        }

        // 渲染待审核内容
        function renderPendingPosts(posts) {
            const container = document.getElementById('pendingPostsContainer');
            
            if (posts.length === 0) {
                container.innerHTML = '<div class="empty-posts">没有待审核的内容</div>';
                return;
            }

            const sortedPosts = [...posts].sort((a, b) => new Date(b.time) - new Date(a.time));
            
            container.innerHTML = sortedPosts.map(post => `
                <div class="post">
                    <div class="post-header">
                        <span class="sender-name">${post.sender}</span>
                        <span class="post-time">${post.time}</span>
                    </div>
                    <div class="post-content">${post.content}</div>
                    ${post.attachment ? `
                        <div style="margin-top: 10px; padding: 10px; background: #f8f9fa; border-radius: 8px; border-left: 3px solid #007bff;">
                            <div style="font-weight: bold; color: #007bff;">附件: ${post.attachment.originalname}</div>
                            <div style="color: #666; font-size: 0.9em;">${formatFileSize(post.attachment.size)} (${post.attachment.mimetype})</div>
                        </div>
                    ` : ''}
                    <div class="action-buttons">
                        <button class="approve-btn" onclick="approvePost(${post.id})">通过</button>
                        <button class="reject-btn" onclick="rejectPost(${post.id})">拒绝</button>
                    </div>
                </div>
            `).join('');
        }

        // 通过审核
        async function approvePost(postId) {
            if (!isAdminLoggedIn) return;
            
            try {
                const response = await fetch(`/api/posts/${postId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ action: 'approve' })
                });

                if (response.ok) {
                    loadPendingPosts();
                    // 通知主页面刷新
                    if (window.opener) {
                        window.opener.location.reload();
                    }
                    alert('已通过审核！');
                } else {
                    throw new Error('审核失败');
                }
            } catch (error) {
                console.error('审核失败:', error);
                alert('审核失败，请重试！');
            }
        }

        // 拒绝并删除
        async function rejectPost(postId) {
            if (!isAdminLoggedIn) return;
            
            if (!confirm('确定要拒绝并删除这条内容吗？')) {
                return;
            }

            try {
                const response = await fetch(`/api/posts/${postId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ action: 'reject' })
                });

                if (response.ok) {
                    loadPendingPosts();
                    alert('已拒绝并删除！');
                } else {
                    throw new Error('操作失败');
                }
            } catch (error) {
                console.error('操作失败:', error);
                alert('操作失败，请重试！');
            }
        }

        // 处理系统帖子附件选择事件
        function handleSystemFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;

            if (file.size > 20 * 1024 * 1024) {
                alert('文件不能超过20MB！');
                document.getElementById('systemFileUpload').value = '';
                document.getElementById('systemPreviewContainer').innerHTML = '';
                return;
            }

            document.getElementById('systemFileInfo').innerHTML = `
                <div class="file-info">
                    <p><strong>文件名:</strong> ${file.name}</p>
                    <p><strong>文件大小:</strong> ${formatFileSize(file.size)}</p>
                    <p><strong>文件类型:</strong> ${file.type}</p>
                </div>
            `;

            const previewContainer = document.getElementById('systemPreviewContainer');
            previewContainer.innerHTML = '';

            if (file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    previewContainer.innerHTML = `<img src="${e.target.result}" class="preview-image" alt="预览图片">`;
                };
                reader.readAsDataURL(file);
            } else if (file.type.startsWith('video/')) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    previewContainer.innerHTML = `<video controls class="preview-video"><source src="${e.target.result}" type="${file.type}">您的浏览器不支持视频播放。</video>`;
                };
                reader.readAsDataURL(file);
            } else if (file.type.startsWith('audio/')) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    previewContainer.innerHTML = `<audio controls class="preview-audio"><source src="${e.target.result}" type="${file.type}">您的浏览器不支持音频播放。</audio>`;
                };
                reader.readAsDataURL(file);
            } else {
                previewContainer.innerHTML = `
                    <div style="padding: 20px; background: #f8f9fa; border-radius: 8px; text-align: center;">
                        <div style="font-size: 3em; margin-bottom: 10px;">📄</div>
                        <p>文件预览：${file.name}</p>
                    </div>
                `;
            }
        }

        // 发布系统帖子
        async function createSystemPost() {
            if (!isAdminLoggedIn) return;
            
            const content = document.getElementById('systemContent').value.trim();
            const fileInput = document.getElementById('systemFileUpload');
            const file = fileInput.files[0];
            
            if (!content) {
                alert('请输入要发布的系统消息！');
                return;
            }

            const formData = new FormData();
            formData.append('content', content);
            if (file) {
                formData.append('file', file);
            }

            try {
                const response = await fetch('/api/system-posts', {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    const result = await response.json();
                    
                    // 清空表单
                    document.getElementById('systemContent').value = '';
                    document.getElementById('systemFileUpload').value = '';
                    document.getElementById('systemFileInfo').innerHTML = '';
                    document.getElementById('systemPreviewContainer').innerHTML = '';
                    
                    // 通知主页面刷新
                    if (window.opener) {
                        window.opener.location.reload();
                    }
                    alert('系统帖子已发布！');
                } else {
                    throw new Error('发布失败');
                }
            } catch (error) {
                console.error('发布失败:', error);
                alert('发布失败，请重试！');
            }
        }

        // 处理公告附件选择事件
        function handleAnnouncementFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;

            if (file.size > 20 * 1024 * 1024) {
                alert('文件不能超过20MB！');
                document.getElementById('announcementFileUpload').value = '';
                document.getElementById('announcementPreviewContainer').innerHTML = '';
                return;
            }

            document.getElementById('announcementFileInfo').innerHTML = `
                <div class="file-info">
                    <p><strong>文件名:</strong> ${file.name}</p>
                    <p><strong>文件大小:</strong> ${formatFileSize(file.size)}</p>
                    <p><strong>文件类型:</strong> ${file.type}</p>
                </div>
            `;

            const previewContainer = document.getElementById('announcementPreviewContainer');
            previewContainer.innerHTML = '';

            if (file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    previewContainer.innerHTML = `<img src="${e.target.result}" class="preview-image" alt="预览图片">`;
                };
                reader.readAsDataURL(file);
            } else if (file.type.startsWith('video/')) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    previewContainer.innerHTML = `<video controls class="preview-video"><source src="${e.target.result}" type="${file.type}">您的浏览器不支持视频播放。</video>`;
                };
                reader.readAsDataURL(file);
            } else if (file.type.startsWith('audio/')) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    previewContainer.innerHTML = `<audio controls class="preview-audio"><source src="${e.target.result}" type="${file.type}">您的浏览器不支持音频播放。</audio>`;
                };
                reader.readAsDataURL(file);
            } else {
                previewContainer.innerHTML = `
                    <div style="padding: 20px; background: #f8f9fa; border-radius: 8px; text-align: center;">
                        <div style="font-size: 3em; margin-bottom: 10px;">📄</div>
                        <p>文件预览：${file.name}</p>
                    </div>
                `;
            }
        }

        // 加载公告
        async function loadAnnouncements() {
            if (!isAdminLoggedIn) return;
            
            try {
                const response = await fetch('/api/posts');
                const allContent = await response.json();
                const announcements = allContent.filter(item => item.type === 'announcement');
                renderAnnouncements(announcements);
            } catch (error) {
                console.error('加载公告失败:', error);
            }
        }

        // 渲染公告
        function renderAnnouncements(announcements) {
            const container = document.getElementById('announcementsContainer');
            
            if (announcements.length === 0) {
                container.innerHTML = '<div class="empty-posts">暂无公告</div>';
                return;
            }

            const sortedAnnouncements = [...announcements].sort((a, b) => new Date(b.time) - new Date(a.time));
            
            container.innerHTML = sortedAnnouncements.map(announcement => `
                <div class="announcement">
                    <div class="post-header">
                        <span class="sender-name">${announcement.title}</span>
                        <span class="post-time">${announcement.time}</span>
                    </div>
                    <div class="post-content">${announcement.content}</div>
                    ${announcement.attachment ? `
                        <div style="margin-top: 10px; padding: 10px; background: #f8f9fa; border-radius: 8px; border-left: 3px solid #007bff;">
                            <div style="font-weight: bold; color: #007bff;">附件: ${announcement.attachment.originalname}</div>
                            <div style="color: #666; font-size: 0.9em;">${formatFileSize(announcement.attachment.size)} (${announcement.attachment.mimetype})</div>
                            ${announcement.attachment.preview === 'image' ? `
                                <div class="preview-media">
                                    <img src="${announcement.attachment.path}" alt="附件图片" style="max-width: 100%; max-height: 300px; border-radius: 8px;">
                                </div>
                            ` : announcement.attachment.preview === 'video' ? `
                                <div class="preview-media">
                                    <video controls style="max-width: 100%; max-height: 300px; border-radius: 8px;">
                                        <source src="${announcement.attachment.path}" type="${announcement.attachment.mimetype}">
                                        您的浏览器不支持视频播放。
                                    </video>
                                </div>
                            ` : announcement.attachment.preview === 'audio' ? `
                                <div class="preview-media">
                                    <audio controls style="width: 100%;">
                                        <source src="${announcement.attachment.path}" type="${announcement.attachment.mimetype}">
                                        您的浏览器不支持音频播放。
                                    </audio>
                                </div>
                            ` : ''}
                            <a href="${announcement.attachment.path}" target="_blank" style="display: inline-block; margin-top: 5px; color: #007bff; text-decoration: none; font-weight: bold;">📥 点击下载</a>
                        </div>
                    ` : ''}
                    <div class="action-buttons">
                        <button class="delete-btn" onclick="deleteAnnouncement(${announcement.id})">删除</button>
                    </div>
                </div>
            `).join('');
        }

        // 发布公告
        async function publishAnnouncement() {
            if (!isAdminLoggedIn) return;
            
            const title = document.getElementById('announcementTitle').value.trim();
            const content = document.getElementById('announcementContent').value.trim();
            const fileInput = document.getElementById('announcementFileUpload');
            const file = fileInput.files[0];
            
            if (!title || !content) {
                alert('请输入公告标题和内容！');
                return;
            }

            const formData = new FormData();
            formData.append('title', title);
            formData.append('content', content);
            if (file) {
                formData.append('file', file);
            }

            try {
                const response = await fetch('/api/announcements', {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    const result = await response.json();
                    
                    // 清空表单
                    document.getElementById('announcementTitle').value = '';
                    document.getElementById('announcementContent').value = '';
                    document.getElementById('announcementFileUpload').value = '';
                    document.getElementById('announcementFileInfo').innerHTML = '';
                    document.getElementById('announcementPreviewContainer').innerHTML = '';
                    
                    loadAnnouncements();
                    // 通知主页面刷新
                    if (window.opener) {
                        window.opener.location.reload();
                    }
                    alert('公告已发布！');
                } else {
                    throw new Error('发布失败');
                }
            } catch (error) {
                console.error('发布失败:', error);
                alert('发布失败，请重试！');
            }
        }

        // 删除公告
        async function deleteAnnouncement(id) {
            if (!isAdminLoggedIn) return;
            
            if (!confirm('确定要删除这条公告吗？')) {
                return;
            }

            try {
                const response = await fetch(`/api/announcements/${id}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    loadAnnouncements();
                    // 通知主页面刷新
                    if (window.opener) {
                        window.opener.location.reload();
                    }
                    alert('公告已删除！');
                } else {
                    throw new Error('删除失败');
                }
            } catch (error) {
                console.error('删除失败:', error);
                alert('删除失败，请重试！');
            }
        }

        // 格式化文件大小
        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }
    </script>
</body>
