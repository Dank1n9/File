<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文件存储 · shiorko 内域</title>
  <!-- 柔和现代的风格，保留原作的警示感，同时提升可读性与美观度 -->
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #f0f4fa 0%, #e6ecf5 100%);
      font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      margin: 0;
      color: #1e293b;
    }

    .card {
      max-width: 780px;
      width: 100%;
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 42px;
      box-shadow: 
        0 25px 50px -12px rgba(0,0,0,0.2),
        inset 0 1px 2px rgba(255,255,255,0.8);
      border: 1px solid rgba(255,255,255,0.6);
      overflow: hidden;
      transition: all 0.2s ease;
    }

    .inner {
      padding: 2.8rem 2.8rem 2rem 2.8rem;
    }

    /* 醒目的头部 — 融合了原版 “你怎么到这来了？” 的意外感 */
    .title-block {
      text-align: center;
      margin-bottom: 2rem;
    }

    .title-block h1 {
      font-size: 3.2rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      background: linear-gradient(130deg, #1e2b3a, #1e3b4a);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      display: inline-block;
      padding: 0 1rem 0.5rem;
      border-bottom: 3px dashed #94a3b8;
    }

    .title-block .sub-head {
      font-size: 1.2rem;
      color: #475569;
      margin-top: 0.5rem;
      font-weight: 400;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .title-block .sub-head span {
      background: #d9e2ef;
      padding: 0.25rem 1rem;
      border-radius: 40px;
      font-size: 0.9rem;
      font-weight: 500;
      color: #1e3a5f;
      border: 1px solid #b7c9e2;
    }

    /* 主要内容卡片区 — 类似柔和的中性面板 */
    .message-panel {
      background: #ffffffcc;
      border-radius: 32px;
      padding: 2.5rem 2rem;
      backdrop-filter: blur(4px);
      box-shadow: 0 8px 20px -8px rgba(0,20,30,0.15);
      border: 1px solid rgba(255,255,255,0.8);
      margin-bottom: 2.2rem;
    }

    .intro-text {
      font-size: 1.25rem;
      text-align: center;
      color: #2c3f5c;
      font-weight: 400;
      border-bottom: 2px dotted #b9c9e0;
      padding-bottom: 1.4rem;
      margin-bottom: 1.8rem;
    }

    .intro-text strong {
      background: #f1f6fd;
      padding: 0.2rem 0.7rem;
      border-radius: 24px;
      font-weight: 600;
      color: #0f2b45;
    }

    .warning-sign {
      text-align: center;
      margin: 1.5rem 0 1.2rem;
    }

    .warning-sign .big-red {
      color: #b91c1c;
      background: rgba(255, 225, 225, 0.8);
      font-size: 1.8rem;
      font-weight: 700;
      padding: 0.6rem 2rem;
      border-radius: 60px;
      display: inline-block;
      border: 2px solid #fecaca;
      backdrop-filter: blur(2px);
      letter-spacing: 1px;
      box-shadow: 0 4px 8px rgba(185,28,28,0.1);
    }

    .rule-box {
      background: #ecf2fa;
      border-radius: 28px;
      padding: 1.8rem 1.5rem;
      margin: 2rem 0 1.2rem;
      border-left: 8px solid #3b6e9c;
      font-size: 1.2rem;
    }

    .rule-line {
      display: flex;
      align-items: baseline;
      gap: 0.8rem;
      flex-wrap: wrap;
      justify-content: center;
      margin: 1rem 0;
    }

    .url-base {
      background: #1e2b3c;
      color: #cbd5e1;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 1.1rem;
      padding: 0.4rem 1rem;
      border-radius: 60px;
      border: 1px solid #2f4057;
    }

    .url-highlight {
      background: #bcd0f0;
      color: #002856;
      font-family: monospace;
      font-weight: 700;
      font-size: 1.3rem;
      padding: 0.3rem 1rem;
      border-radius: 60px;
      border: 2px dashed #2563eb;
    }

    .ext-warning {
      color: #b91c1c;
      font-weight: 700;
      background: #fff0f0;
      padding: 0.2rem 1.2rem;
      border-radius: 60px;
      font-size: 1.1rem;
      border: 1px solid #f5baba;
      display: inline-block;
    }

    .signature-note {
      font-size: 1.5rem;
      font-weight: 350;
      text-align: center;
      color: #00668c;
      background: #dcf2fe;
      width: fit-content;
      margin: 2rem auto 1rem;
      padding: 0.5rem 2.2rem;
      border-radius: 100px;
      border: 2px solid #a3d0f0;
    }

    /* 图片展示区 — 优雅居中，保留原图ZM.jpg，并加精致光晕 */
    .image-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 1.8rem 0 1rem;
    }

    .image-frame {
      background: #ffffffd6;
      border-radius: 38px;
      padding: 0.8rem;
      box-shadow: 0 20px 30px -12px rgba(0,40,70,0.35);
      border: 2px solid white;
      max-width: 320px;
      transition: transform 0.2s;
    }

    .image-frame:hover {
      transform: scale(1.01);
    }

    .image-frame img {
      width: 100%;
      height: auto;
      max-width: 300px;
      border-radius: 28px;
      display: block;
      background: #cad9ee; /* 占位背景 */
      border: 2px solid #edf4ff;
    }

    .image-caption {
      margin-top: 0.4rem;
      font-size: 0.85rem;
      color: #446688;
    }

    /* 底部跳转链接 + 版权 */
    .footer-links {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.8rem;
      margin-top: 1.2rem;
    }

    .back-link {
      font-size: 1.3rem;
      background: #d4e2fc;
      padding: 0.6rem 2rem;
      border-radius: 60px;
      transition: all 0.2s;
      border: 1px solid #a5c0e8;
      color: #003a6b;
      text-decoration: none;
      font-weight: 550;
      box-shadow: 0 6px 12px -8px #334e78;
    }

    .back-link:hover {
      background: #b6cef0;
      border-color: #3f73b0;
      box-shadow: 0 8px 14px -6px #2b4e7a;
      text-decoration: none;
      color: #001f3f;
    }

    .copyright {
      font-size: 0.95rem;
      color: #54799e;
      border-top: 2px solid #cbd6e6;
      padding-top: 1.5rem;
      margin-top: 1.5rem;
      width: 100%;
      text-align: center;
      letter-spacing: 0.3px;
    }

    .copyright strong {
      font-weight: 600;
      color: #1b496b;
    }

    /* 保持原表格式干净，移动端优化 */
    @media (max-width: 500px) {
      .inner {
        padding: 1.8rem 1.2rem 1.2rem;
      }
      .title-block h1 {
        font-size: 2.2rem;
      }
      .warning-sign .big-red {
        font-size: 1.4rem;
      }
      .rule-box {
        padding: 1.2rem 0.8rem;
      }
      .url-base, .url-highlight {
        font-size: 0.9rem;
      }
    }
  </style>
  <!-- 优雅的备用字体 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
</head>
<body>

<div class="card">
  <div class="inner">
    <!-- 头部区域 — 你怎么到这来了？保留原味但更有设计感 -->
    <div class="title-block">
      <h1>你怎么到这来了？</h1>
      <div class="sub-head">
        <span>🔒 内部文件分发点</span>
        <span>📦 shiorko.dpdns.org/static</span>
      </div>
    </div>

    <!-- 主要内容面板 (原本的表格结构已经转为灵活div, 但语义保留) -->
    <div class="message-panel">
      <!-- 第一段说明 -->
      <div class="intro-text">
        ⚙️ 这里是 <strong>shiorko.dpdns.org</strong> 的文件提供地址 —— 标准文件从这里发出。
      </div>

      <!-- 红色的醒目提示 (本站不直接提供任何网址) 更强烈 -->
      <div class="warning-sign">
        <div class="big-red">⛔ 本站不直接提供任何网址 ⛔</div>
      </div>

      <!-- 你不应该到这来的！ 加强神秘感 -->
      <div style="text-align: center; margin: 1rem 0 1.6rem;">
        <span style="background: #0b1f33; color: #c9dbf5; padding: 0.5rem 2.2rem; border-radius: 30px; font-size: 1.4rem; letter-spacing: 1px;">🚷 你不应该到这来的！</span>
      </div>

      <!-- 详细用法： 如果你知道自己在干什么... 使用规则框 -->
      <div class="rule-box">
        <div style="text-align: center; font-weight: 600; margin-bottom: 1.5rem; font-size: 1.3rem; color: #0c4a6e;">
          🧭 如果你知道自己在干什么
        </div>

        <div class="rule-line">
          <span class="url-base">file.shiorko.dpdns.org/file/</span>
          <span class="url-highlight">[ 文件名.扩展名 ]</span>
        </div>

        <div style="display: flex; justify-content: center; gap: 0.8rem; flex-wrap: wrap; margin-top: 1rem;">
          <span class="ext-warning">⚠️ 必须加上文件拓展名，否则 404</span>
        </div>

        <!-- 小提示: 标准文件从这里发出，保留原有风格 和 图片区放在一起更连贯 -->
        <div style="text-align: center; margin-top: 2rem;">
          <div class="signature-note">
            📀 标准文件从这里发出
          </div>
        </div>
      </div>

      <!-- 原图 ZM.jpg 展示区 (保持链接和图片) 且带有微装饰 -->
      <div class="image-area">
        <div class="image-frame">
          <img src="file/ZM.jpg" alt="ZM.jpg — 内部文件示例" onerror="this.style.background='#b4c8e5'; this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIzMDAiIGhlaWdodD0iMzAwIiB2aWV3Qm94PSIwIDAgMzAwIDMwMCI+PHJlY3Qgd2lkdGg9IjMwMCIgaGVpZ2h0PSIzMDAiIGZpbGw9IiNiNGM4ZTUiLz48dGV4dCB4PSI1MCUiIHk9IjUwJSIgZG9taW5hbnQtYmFzZWxpbmU9Im1pZGRsZSIgdGV4dC1hbmNob3I9Im1pZGRsZSIgZmlsbD0iIzFkM2I2MSIgZm9udC1mYW1pbHk9Ik1vbm9zcGFjZSIgZm9udC1zaXplPSIxOCI+Wk0uanBnPC90ZXh0Pjwvc3ZnPg=='">
        </div>
        <div class="image-caption"></div>
      </div>

      <!-- 最底下 “点此跳回主站” 和版权 使用footer处理 -->
      <div class="footer-links">
        <a href="https://shiorko.dpdns.org" class="back-link">⬅ 点此跳回主站 dash</a>

        <!-- 底部版权 完全符合要求：© Copyright © 2025-2026 shiorko -->
        <div class="copyright">
          © Copyright © 2025-2026 shiorko
        </div>
      </div>
    </div> <!-- end message-panel -->

    <!-- 原表格完全去除，但保留原意：所有信息均在上面体现 -->
  </div> <!-- end inner -->
</div> <!-- end card -->

<!-- 额外的细微说明：保留站点气质，但不再有table冗余 -->
</body>
</html>
